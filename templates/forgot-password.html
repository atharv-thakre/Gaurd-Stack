<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/static/forgot-password/style.css">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p id="status-msg" class="message"></p>

        <form id="forgot-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your registered email">
            </div>
            <button type="submit" id="send-btn">Send OTP</button>
        </form>

        <form id="reset-form" class="hidden">
            <div class="input-group">
                <label>Enter OTP</label>
                <input type="text" id="otp" required placeholder="6-digit code">
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="new-password" required placeholder="Min 8 characters">
            </div>
            <button type="submit" id="reset-btn">Update Password</button>
        </form>
        
        <div class="footer">
            <a href="/">Back to Login</a>
        </div>
    </div>
    <script src="/static/forgot-password/scripts.js"></script>
</body>
</html>
